<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>reveal-md</title>
    <link rel="shortcut icon" href="./favicon.ico" />
    <link rel="stylesheet" href="./dist/reset.css" />
    <link rel="stylesheet" href="./dist/reveal.css" />
    <link rel="stylesheet" href="./dist/theme/black.css" id="theme" />
    <link rel="stylesheet" href="./css/highlight/base16/zenburn.css" />

  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <section data-markdown
                  data-separator="^\n\n\n"
                  data-separator-vertical="^\n\n"
                  data-separator-notes="^Note:"
                  data-charset="utf-8">
          <textarea data-template>
            <div style="text-align: left;">

            ## 努力の本質
            ---
            #### 「頑張っているのに報われない」をなくす、<br>　思考と設計の技術

            </div>


            <div style="text-align: left;">

            **Presenter:**　Tokunaga Tatsuya<br>
            **Date:**　　　&nbsp;2026/01/10

            </div>


            <div style="text-align: left;">

            ### [Agenda]
            1. なぜ今、「努力」を定義し直すのか
            2. プロフェッショナルとしての「基準」
            3. 成長のための「設計」
            4. マネジメントへの応用とまとめ
            </div>


            
            <div style="text-align: left;">

            ### 1. なぜ今、「努力」を定義し直すのか？
            ---
            </div>


            <div style="text-align: left;">

            #### 起こりがちな「努力の誤解」<br>
            **多くの人が陥る、報われない思考パターン：**
            * ❌ **「時間をかければ努力したことになる」**<br>
                （消費時間 ＝ 頑張った量ではない）
            * ❌ **「辛いことを我慢するのが努力だ」**<br>
                （苦痛への耐性 ＝ 成果ではない）
            * ❌ **「結果が出なくても、過程は評価される」**<br>
                （成果なき過程は自己満足に過ぎない）
            
            </div>
            
            
            <div style="text-align: left;">
            
            ### 本スライドの目的
            努力を「精神論」から **「再現性のある技術」**へと<br>
            アップデートする。
            </div>
            
            
            <div style="text-align: left;">
            
            > **Goal** ><br>
            「なんとなく頑張る」をやめ、<br>
            **「勝つべくして勝つ」**為の <br>
            　行動様式をインストールする。
            </div>
            

            
            <div style="text-align: left;">
            
            ## 2. 努力とは<br>「他者評価」であり「日常」
            ---
            </div>
            
            
            ### 「努力」の定義
            > 「努力って人が決めることだから。自分で『私、努力してます』<br>と言うのはおかしい」
            
            
            ### プロフェッショナルが目指すべき状態
            1. **主観の罠を捨てる**
                * 「これだけやったから報われるはず」という見返りを求める心は、成長を阻害する。
            2. **基準値を上げる**
                * 自分にとっての「日常（当たり前）」を、<br>他人が見た時に「努力」に見える状態が最強
                *例：毎晩10分の素振りを3年続けること。*
            

            
            <div style="text-align: left;">
            
            ## 3. 努力の「設計ミス」を防ぐ
            ---
            </div>
            
            
            <div style="text-align: left;">
            
            ### 間違った努力を防ぐ3つの原則<br>
            </div>
            
            
            <div style="text-align: left;">
            
            ### ①目標に期限を設定する
            #### なぜ必要なのか
            * 時間・労力・資金などの資源が失われたことを<br>自覚した時、失敗を正しく認識できるから
            * 「まだ成果はないけど、まだ挑戦中なんで」と<br>成功か失敗かの判定を無限に先送りできてしまうから
            </div>
            
            
            <div style="text-align: left;">
            
            ### ② 目標に対するステップを細かく刻む
            #### なぜ必要なのか
            * 自分の現在地を誤認して、<br>高すぎる目標に挑むと『足踏み』に陥るから
            <div>
            
            
            <div style="text-align: left;">
            
            ### ③成果を得るための<br>　「特別な何か」を探さない
            #### なぜ必要なのか
            * どこかに魔法のような正解やショートカットが<br>あると思い込み、地味な鍛錬が疎かになるから
            * 他人の「答え」（成功例）を集めたところで<br>己の”経験”にはならないから
            * その「答え」だと思う”何か”を探している間にも<br>競争相手は鍛錬や経験を積んでいるから
            </div>
            
            
            <div style="text-align: left;">
            
            #### まとめ：
            * 成功と失敗を計測するために期限を切る。
            * 自分ができる確実な高さまで<br>ステップを細分化する。
            * 特別な「何か」に期待せず<br>自分ができることをやる。
            
            これらが「努力」と呼ばれるものの本質である。
            </div>
            

            
            <div style="text-align: left;">
            
            ## 4. 総括：<br>プレイングマネージャーが目指すべき「努力の技術」
            ---
            </div>
            
            
            <div style="text-align: left;">
            
            ### Step 1：設計（Manager視点 ）
            * **Deadline:** <br>失敗をデータとして回収するために、<br>必ず期限を設ける。
            * **Breakdown:** <br>メンバーや自分が「これなら今日できる」と<br>思えるレベルまでタスクを分解する。
            
            
            <div style="text-align: left;">
            
            ### Step 2：習慣化（Player視点）
            * **Routine:** <br>決めた行動を「頑張ってやる」のではなく「淡々とやる」状態へ移行する。
            * **Micro-Growth:** <br>他人との比較ではなく、<br>「昨日の自分より少し進んだか」だけを計測する。
            

            
            <div style="text-align: left;">
            
            ## 5. マネジメントへの応用：<br>「頑張り」をどう評価するか？
            
            リーダーとして、<br>メンバーの何を評価し指導すべきか。
            ---
            </div>
            
            
            <div style="text-align: left;">
            
            ### ❌ NGな評価・指導
            * 「もっと気合を入れろ」「頑張りが足りない」<br>（具体性がない精神論）
            * 「遅くまで残って偉いな」<br>（質の伴わない長時間労働への賛美）
            
            
            <div style="text-align: left;">
            
            ### ✅ OKな評価・指導
            * **方向性の確認**<br>
                * 「その努力は、目指す成果に対して<br>正しいベクトルか？」
            * **設計の評価**<br>
                * 「期限とステップは、検証可能な形に<br>設計されているか？」
            * **基準の称賛**<br>
                * 「その高い質の行動を、『当たり前』に<br>できている君のスタンスが素晴らしい」
            

            
            ## 6. まとめ：努力の本質とは
            ---
            </div>

            
            #### 努力とは、苦行に耐えることではない。
            
            
            <div style="text-align: left;">
            
            #### 努力の本質的な定義
            1. **戦略的であること**
                * 期限とステップを設計し、<br>失敗すらもデータに変える。
            2. **日常化すること**
                * 高い基準の行動を、<br>無意識レベルの習慣に落とし込む。
            
            
            ### Message
            **「努力」という言葉に逃げず、<br>成果が出るための準備を淡々と積み重ねよう。**
            **それが、私たちが目指す<br>プロフェッショナルの仕事です。**
            

            
            ---
            *Thank you.*
          </textarea>
        </section>
      </div>
    </div>

    <script src="./dist/reveal.js"></script>

    <script src="./mermaid/dist/mermaid.min.js"></script>

    <script src="./plugin/markdown/markdown.js"></script>
    <script src="./plugin/highlight/highlight.js"></script>
    <script src="./plugin/zoom/zoom.js"></script>
    <script src="./plugin/notes/notes.js"></script>
    <script src="./plugin/math/math.js"></script>
    <script>
      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i];
          for (var key in source) {
            if (source.hasOwnProperty(key)) {
              target[key] = source[key];
            }
          }
        }
        return target;
      }

      // default options to init reveal.js
      var defaultOptions = {
        controls: true,
        progress: true,
        history: true,
        center: true,
        transition: 'default', // none/fade/slide/convex/concave/zoom
        slideNumber: true,
        highlight: {
          highlightOnLoad: false
        },
        plugins: [
          RevealMarkdown,
          RevealHighlight,
          RevealZoom,
          RevealNotes,
          RevealMath
        ]
      };

      // options from URL query string
      var queryOptions = Reveal().getQueryHash() || {};

      var options = extend(defaultOptions, {"_":["md"],"static":"docs"}, queryOptions);
    </script>


    <script>
      Reveal.initialize(options);
      Reveal.addEventListener('ready', function (event) {
        const blocks = Reveal.getRevealElement().querySelectorAll('pre code:not(.mermaid)');
        const hlp = Reveal.getPlugin('highlight');
        blocks.forEach(hlp.highlightBlock);
      });
    </script>

    <script>
      const mermaidOptions = extend({ startOnLoad: false }, {});
      mermaid.startOnLoad = false;
      mermaid.initialize(mermaidOptions);
      const cb = function (event) { mermaid.init(mermaidOptions, '.stack.present>.present pre code.mermaid'); };
      Reveal.addEventListener('ready', cb);
      Reveal.addEventListener('slidetransitionend', cb);
    </script>
  </body>
</html>
